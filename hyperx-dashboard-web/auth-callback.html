<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating - HyperX</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%);
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .loading {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <h2>Authenticating with Discord...</h2>
        <p>Please wait while we complete your login.</p>
    </div>

    <script>
        // This is a placeholder for Discord OAuth callback
        // In production, this would handle the OAuth code exchange
        
        // For now, simulate successful authentication
        setTimeout(() => {
            // Mock Discord user data
            const mockUser = {
                id: '123456789',
                username: 'DiscordUser',
                discriminator: '1234',
                avatar: null
            };
            
            // Store user data
            localStorage.setItem('discordUser', JSON.stringify(mockUser));
            sessionStorage.setItem('freshLogin', 'true');
            
            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        }, 2000);
    </script>
</body>
</html>
